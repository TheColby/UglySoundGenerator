name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --all-targets
      - name: Feature Check CUDA
        run: cargo check --all-targets --features cuda
      - name: Repo Audit
        run: ./scripts/verify_repo.sh
      - name: CLI Help Smoke
        run: cargo run --quiet -- --help >/dev/null
      - name: CLI Presets Smoke
        run: cargo run --quiet -- presets >/dev/null

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --all-targets
      - name: Feature Check Metal
        run: cargo check --all-targets --features metal
