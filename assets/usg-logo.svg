<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">UglySoundGenerator logo</title>
  <desc id="desc">Glitched yellow usg wordmark with cyan, blue, green, and red channel offsets on a dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111c"/>
      <stop offset="60%" stop-color="#0b1422"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      .word {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 470px;
        font-weight: 700;
        letter-spacing: -22px;
      }
      .slice { opacity: 0.95; }
      .glitch { shape-rendering: crispEdges; }
    </style>
    <clipPath id="mid-slice">
      <rect x="0" y="235" width="1600" height="110"/>
    </clipPath>
    <clipPath id="upper-slice">
      <rect x="0" y="155" width="1600" height="62"/>
    </clipPath>
    <clipPath id="lower-slice">
      <rect x="0" y="420" width="1600" height="74"/>
    </clipPath>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <ellipse cx="820" cy="365" rx="690" ry="300" fill="#0f1d2d" opacity="0.35"/>

  <g transform="translate(140 470)">
    <text class="word" x="-32" y="18" fill="#0c330f" opacity="0.75" filter="url(#soft)">usg</text>
    <text class="word" x="-16" y="-6" fill="#0d31ff" opacity="0.88">usg</text>
    <text class="word" x="18" y="-10" fill="#00d8ff" opacity="0.90">usg</text>
    <text class="word" x="34" y="2" fill="#ff1b2d" opacity="0.95">usg</text>
    <text class="word" x="0" y="0" fill="#fff34a">usg</text>
  </g>

  <g class="slice" clip-path="url(#mid-slice)" transform="translate(140 470)">
    <text class="word" x="-48" y="12" fill="#0026ff">usg</text>
    <text class="word" x="10" y="-14" fill="#00ffd5">usg</text>
    <text class="word" x="46" y="6" fill="#ff1f32">usg</text>
    <text class="word" x="0" y="0" fill="#fff34a">usg</text>
  </g>

  <g class="slice" clip-path="url(#upper-slice)" transform="translate(140 470)">
    <text class="word" x="-60" y="12" fill="#0bff37">usg</text>
    <text class="word" x="28" y="-8" fill="#0026ff">usg</text>
    <text class="word" x="64" y="-4" fill="#ff2436">usg</text>
    <text class="word" x="0" y="0" fill="#fff34a">usg</text>
  </g>

  <g class="slice" clip-path="url(#lower-slice)" transform="translate(140 470)">
    <text class="word" x="-26" y="14" fill="#0bff37">usg</text>
    <text class="word" x="14" y="-10" fill="#00d8ff">usg</text>
    <text class="word" x="42" y="8" fill="#ff2436">usg</text>
    <text class="word" x="0" y="0" fill="#fff34a">usg</text>
  </g>

  <g class="glitch">
    <rect x="112" y="255" width="120" height="14" fill="#0bff37" opacity="0.50"/>
    <rect x="1325" y="268" width="182" height="14" fill="#ff2436" opacity="0.78"/>
    <rect x="1185" y="414" width="262" height="18" fill="#00d8ff" opacity="0.55"/>
    <rect x="1280" y="431" width="210" height="12" fill="#fff34a" opacity="0.80"/>
    <rect x="707" y="327" width="88" height="26" fill="#ff2436" opacity="0.92"/>
    <rect x="736" y="334" width="46" height="12" fill="#00ffd5" opacity="0.80"/>
    <rect x="1460" y="314" width="74" height="16" fill="#0bff37" opacity="0.68"/>
    <rect x="1451" y="346" width="46" height="12" fill="#ff2436" opacity="0.82"/>
    <rect x="1463" y="366" width="26" height="38" fill="#fff34a" opacity="0.88"/>
    <rect x="246" y="307" width="88" height="15" fill="#0d31ff" opacity="0.62"/>
    <rect x="248" y="320" width="80" height="9" fill="#ff2436" opacity="0.90"/>
    <rect x="260" y="334" width="52" height="10" fill="#00d8ff" opacity="0.74"/>
    <rect x="90" y="489" width="188" height="11" fill="#0bff37" opacity="0.36"/>
    <rect x="1218" y="503" width="190" height="13" fill="#0026ff" opacity="0.42"/>
  </g>
</svg>
